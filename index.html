<!doctype html>
<html lang="en">
  <head>
    <script>
      const originalConsoleError = console.error;
      console.error = function(...args) {
        const msg = args.join(' ');
        if (msg.includes('WebSocket') || msg.includes('websocket') || msg.includes('failed to connect')) {
          return;
        }
        originalConsoleError.apply(console, args);
      };
      
      window.addEventListener('error', function(event) {
        if (event && event.message && (event.message.includes('WebSocket') || event.message.includes('websocket') || event.message.includes('failed to connect'))) {
          event.preventDefault();
          event.stopPropagation();
        }
      }, true);
      
      window.addEventListener('unhandledrejection', function(event) {
        if (event && event.reason) {
          const r = String(event.reason);
          if (r.includes('WebSocket') || r.includes('websocket') || r.includes('failed to connect')) {
            event.preventDefault();
            event.stopPropagation();
          }
        }
      }, true);
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SYNQ - Operational Portal</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#6366f1" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('PWA ServiceWorker registered with scope: ', registration.scope);
            })
            .catch((err) => {
              console.warn('PWA ServiceWorker registration failed: ', err);
            });
        });
      }
    </script>
  </body>
</html>
